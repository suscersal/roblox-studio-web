<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
    <title>RbxStudio - OPi3</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: #111827;
            color: #fff;
            font-family: system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column
        }

        #toolbar-top {
            background: #1f2937;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            height: 40px;
            flex-shrink: 0;
            border-bottom: 1px solid #374151;
            overflow-x: auto
        }

        #toolbar-top button {
            background: #374151;
            border: none;
            color: #fff;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap
        }

        #toolbar-top button:hover {
            background: #4b5563
        }

        #toolbar-top button.green {
            background: #065f46
        }

        #toolbar-top button.red {
            background: #7f1d1d
        }

        #toolbar-top button.blue {
            background: #1e3a8a
        }

        #toolbar-top button.purple {
            background: #7c3aed
        }

        #toolbar-top .sep {
            width: 1px;
            height: 24px;
            background: #374151;
            margin: 0 4px
        }

        #toolbar-top .title {
            font-weight: bold;
            margin-right: 8px;
            font-size: 14px;
            white-space: nowrap
        }

        #main {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        #explorer {
            width: 220px;
            min-width: 150px;
            max-width: 400px;
            flex-shrink: 0;
            background: #1f2937;
            display: flex;
            flex-direction: column;
            position: relative
        }

        .resizer {
            width: 5px;
            background: #374151;
            cursor: col-resize;
            flex-shrink: 0;
            transition: background 0.2s;
            position: relative;
            z-index: 10
        }

        .resizer:hover,
        .resizer.active {
            background: #3b82f6
        }

        .resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 3px;
            height: 30px;
            background: #6b7280;
            border-radius: 2px
        }

        .resizer:hover::after,
        .resizer.active::after {
            background: #fff
        }

        #explorer-header {
            background: #111827;
            padding: 4px 8px;
            font-size: 12px;
            font-weight: bold;
            color: #9ca3af;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        #explorer-header button {
            background: #374151;
            border: none;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px
        }

        #search-box {
            background: #374151;
            border: none;
            color: #fff;
            padding: 4px 8px;
            width: 100%;
            font-size: 12px;
            outline: none;
            flex-shrink: 0
        }

        #tree-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden
        }

        #tree {
            padding: 2px 0
        }

        .tree-node {
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 1px 0;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
            overflow: hidden;
            font-size: 12px
        }

        .tree-node:hover {
            background: #374151
        }

        .tree-node.selected {
            background: #1e3a5f
        }

        .tree-arrow {
            width: 14px;
            text-align: center;
            color: #6b7280;
            font-size: 10px;
            flex-shrink: 0
        }

        .tree-icon {
            width: 16px;
            height: 16px;
            object-fit: contain;
            flex-shrink: 0;
            background: white;
            border-radius: 2px
        }

        .tree-label {
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 2px
        }

        .tree-label mark {
            background: #854d0e;
            color: #fef08a;
            border-radius: 2px
        }

        #viewport {
            flex: 1;
            position: relative;
            background: #0f172a;
            overflow: hidden;
            min-width: 200px
        }

        #viewport canvas {
            display: block
        }

        #vp-label {
            position: absolute;
            bottom: 8px;
            left: 8px;
            font-size: 11px;
            color: #9ca3af;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 6px 10px;
            border-radius: 6px;
            line-height: 1.5;
            z-index: 5;
            backdrop-filter: blur(4px)
        }

        #fps-counter {
            position: absolute;
            top: 8px;
            left: 8px;
            font-size: 11px;
            color: #22c55e;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 5;
            font-family: monospace
        }

        #speed-indicator {
            position: absolute;
            top: 8px;
            right: 8px;
            font-size: 11px;
            color: #fbbf24;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 4px;
            z-index: 5;
            display: none
        }

        #quality-selector {
            position: absolute;
            top: 36px;
            right: 8px;
            z-index: 5;
            display: flex;
            gap: 2px
        }

        #quality-selector button {
            background: rgba(31, 41, 55, 0.9);
            border: 1px solid #4b5563;
            color: #fff;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            backdrop-filter: blur(4px)
        }

        #quality-selector button.active {
            background: #3b82f6;
            border-color: #60a5fa
        }

        #rightpanel {
            width: 260px;
            min-width: 200px;
            max-width: 500px;
            flex-shrink: 0;
            background: #1f2937;
            display: flex;
            flex-direction: column
        }

        #tabs {
            display: flex;
            background: #111827;
            flex-shrink: 0
        }

        .tab {
            flex: 1;
            padding: 6px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            color: #6b7280;
            border-bottom: 2px solid transparent
        }

        .tab.active {
            color: #fff;
            border-bottom: 2px solid #3b82f6
        }

        #tab-props {
            flex: 1;
            overflow-y: auto;
            padding: 4px
        }

        #tab-script {
            flex: 1;
            display: none;
            flex-direction: column
        }

        #script-name {
            padding: 4px 6px;
            font-size: 11px;
            color: #6b7280;
            flex-shrink: 0;
            background: #111827
        }

        #script-editor-container {
            flex: 1;
            min-height: 0;
            position: relative
        }

        .CodeMirror {
            height: 100% !important;
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px
        }

        #script-save-btn {
            background: #065f46;
            border: none;
            color: #fff;
            padding: 6px;
            cursor: pointer;
            font-size: 12px;
            flex-shrink: 0
        }

        #toolbar-bottom {
            background: #1f2937;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            height: 35px;
            flex-shrink: 0;
            border-top: 1px solid #374151;
            overflow-x: auto
        }

        #toolbar-bottom .inv-item {
            background: #374151;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 2px solid transparent;
            transition: all 0.2s
        }

        #toolbar-bottom .inv-item:hover {
            background: #4b5563;
            border-color: #3b82f6
        }

        #toolbar-bottom .inv-item.selected {
            background: #1e3a5f;
            border-color: #3b82f6
        }

        #toolbar-bottom .inv-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
            background: white;
            border-radius: 3px
        }

        #toolbar-bottom .inv-label {
            font-weight: 500
        }

        #toolbar-bottom .sep {
            width: 1px;
            height: 20px;
            background: #374151;
            margin: 0 2px
        }

        .prop-header {
            padding: 4px 6px;
            background: #111827;
            border-radius: 4px;
            margin-bottom: 4px
        }

        .prop-cls {
            font-weight: bold;
            font-size: 13px
        }

        .prop-ref {
            font-size: 10px;
            color: #6b7280
        }

        .prop-row {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 1px 2px;
            min-height: 24px
        }

        .prop-name {
            width: 110px;
            flex-shrink: 0;
            font-size: 11px;
            color: #9ca3af;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .prop-val {
            flex: 1;
            background: #374151;
            border: none;
            color: #fff;
            font-size: 11px;
            padding: 2px 4px;
            border-radius: 3px;
            width: 100%;
            outline: none
        }

        .prop-val:focus {
            background: #4b5563
        }

        .prop-bool {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #3b82f6
        }

        .prop-color-preview {
            width: 18px;
            height: 18px;
            border-radius: 3px;
            border: 1px solid #4b5563;
            flex-shrink: 0;
            cursor: pointer
        }

        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100
        }

        #modal-overlay.show {
            display: flex
        }

        .modal {
            background: #1f2937;
            border-radius: 8px;
            padding: 16px;
            min-width: 320px;
            max-width: 90vw;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .modal h3 {
            font-size: 15px;
            font-weight: bold
        }

        .modal input,
        .modal select {
            background: #374151;
            border: 1px solid #4b5563;
            color: #fff;
            padding: 6px 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 13px;
            outline: none
        }

        .modal button {
            background: #374151;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px
        }

        .modal button:hover {
            background: #4b5563
        }

        .modal-row {
            display: flex;
            gap: 6px
        }

        .modal-row button {
            flex: 1
        }

        #fb-path {
            font-size: 11px;
            color: #9ca3af;
            padding: 4px 0;
            word-break: break-all
        }

        #fb-list {
            flex: 1;
            overflow-y: auto;
            border: 1px solid #374151;
            border-radius: 4px;
            min-height: 200px;
            max-height: 40vh
        }

        .fb-entry {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            cursor: pointer;
            font-size: 12px
        }

        .fb-entry:hover {
            background: #374151
        }

        .fb-entry.file-rbxl {
            color: #86efac
        }

        .fb-entry.file-json {
            color: #fcd34d
        }

        .fb-entry.dir {
            color: #fde68a
        }

        .fb-size {
            margin-left: auto;
            color: #6b7280;
            font-size: 10px
        }

        ::-webkit-scrollbar {
            width: 4px
        }

        ::-webkit-scrollbar-track {
            background: #1f2937
        }

        ::-webkit-scrollbar-thumb {
            background: #374151
        }

        #notify {
            position: fixed;
            bottom: 50px;
            right: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 200
        }

        .notif {
            background: #065f46;
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 13px;
            animation: fadein .2s ease
        }

        .notif.err {
            background: #7f1d1d
        }

        .notif.warn {
            background: #78350f
        }

        @keyframes fadein {
            from {
                opacity: 0;
                transform: translateY(8px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        #mobile-pad {
            position: absolute;
            bottom: 56px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 6px;
            z-index: 10;
            pointer-events: none
        }

        @media(pointer:coarse) {
            #mobile-pad {
                display: flex
            }
        }

        .pad-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
            pointer-events: all
        }

        .pad-row-h {
            display: flex;
            gap: 4px
        }

        .pad-btn {
            width: 52px;
            height: 52px;
            background: rgba(31, 41, 55, 0.85);
            border: 1px solid #4b5563;
            border-radius: 10px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .pad-btn.active {
            background: rgba(59, 130, 246, 0.7)
        }
    </style>
</head>

<body>
    <div id="toolbar-top">
        <span class="title">🎮 RbxStudio</span>
        <div class="sep"></div>
        <button onclick="openFileBrowser('open')" title="Открыть файл (Ctrl+O)">📂 Открыть</button>
        <button class="green" onclick="saveFile()" title="Сохранить (Ctrl+S)">💾 Сохранить</button>
        <button onclick="openFileBrowser('save')" title="Сохранить как">💾 Как...</button>
        <div class="sep"></div>
        <button onclick="showAddDialog()" title="Добавить объект">➕ Добавить</button>
        <button class="red" onclick="deleteSelected()" title="Удалить (Delete)">🗑 Удалить</button>
        <div class="sep"></div>
        <button onclick="reloadScene()" title="Обновить сцену (F5)">🔄 Обновить</button>
        <button class="blue" onclick="showPublishDialog()" title="Опубликовать">☁ Публикация</button>
        <div class="sep"></div>
        <button onclick="resetCamera()" title="Сбросить камеру">🏠 Сброс</button>
        <button onclick="topView()" title="Вид сверху">⬆ Верх</button>
        <button onclick="frontView()" title="Вид спереди">📷 Фронт</button>
        <button onclick="rightView()" title="Вид справа">➡ Право</button>
        <div class="sep"></div>
        <button onclick="toggleHelpers()" title="Сетка и оси">📏</button>
        <button onclick="resetLayout()" title="Сбросить размеры панелей">📐</button>
    </div>

    <div id="main">
        <div id="explorer">
            <div id="explorer-header">
                <span>Explorer</span>
                <div>
                    <button onclick="collapseAll()" title="Свернуть всё">◢</button>
                    <button onclick="expandAllVisible()" title="Развернуть всё">◣</button>
                </div>
            </div>
            <input id="search-box" placeholder="🔍 Поиск..." oninput="onSearch(this.value)">
            <div id="tree-scroll">
                <div id="tree"></div>
            </div>
        </div>
        <div class="resizer" id="resizer-1"></div>
        <div id="viewport" tabindex="0">
            <div id="fps-counter">FPS: --</div>
            <div id="speed-indicator">🚀 x1.0</div>
            <div id="quality-selector">
                <button onclick="setQuality('low')" class="active" id="q-low">Low</button>
                <button onclick="setQuality('medium')" id="q-med">Med</button>
                <button onclick="setQuality('high')" id="q-high">High</button>
            </div>
            <div id="vp-label">
                🖱️ ЛКМ — вращение | 🖱️ ПКМ — панорама | 🖱️ Колесо — зум<br>
                ⌨️ WASD — движение | F — фокус | Esc — снять
            </div>
            <div id="mobile-pad">
                <div class="pad-col">
                    <button class="pad-btn" data-key="q">⬆</button>
                    <div class="pad-row-h">
                        <button class="pad-btn" data-key="a">◀</button>
                        <button class="pad-btn" data-key="s">▼</button>
                        <button class="pad-btn" data-key="d">▶</button>
                    </div>
                    <button class="pad-btn" data-key="e">⬇</button>
                </div>
                <div class="pad-col" style="margin-left:12px">
                    <button class="pad-btn" data-key="w">▲</button>
                </div>
            </div>
        </div>
        <div class="resizer" id="resizer-2"></div>
        <div id="rightpanel">
            <div id="tabs">
                <div class="tab active" onclick="switchTab('props')">Properties</div>
                <div class="tab" onclick="switchTab('script')">Script</div>
            </div>
            <div id="tab-props">
                <p style="color:#6b7280;font-size:12px;padding:8px">← Выбери объект</p>
            </div>
            <div id="tab-script" style="display:none;flex:1;flex-direction:column">
                <div id="script-name">Скрипт не выбран</div>
                <div id="script-editor-container">
                    <textarea id="script-editor" spellcheck="false"></textarea>
                </div>
                <button id="script-save-btn" onclick="saveScript()">💾 Сохранить скрипт</button>
            </div>
        </div>
    </div>

    <div id="toolbar-bottom">
        <span style="font-size:11px;color:#9ca3af;margin-right:4px;">📋 Быстрое:</span>
        <div class="inv-item" onclick="quickAdd('Part')"><span>🟫</span><span class="inv-label">Part</span></div>
        <div class="inv-item" onclick="quickAdd('SpherePart')"><span>🔵</span><span class="inv-label">Sphere</span>
        </div>
        <div class="inv-item" onclick="quickAdd('WedgePart')"><span>🔺</span><span class="inv-label">Wedge</span></div>
        <div class="sep"></div>
        <div class="inv-item" onclick="quickAdd('Script')"><span>📜</span><span class="inv-label">Script</span></div>
        <div class="inv-item" onclick="quickAdd('LocalScript')"><span>📝</span><span
                class="inv-label">LocalScript</span></div>
        <div class="sep"></div>
        <div class="inv-item" onclick="quickAdd('PointLight')"><span>💡</span><span class="inv-label">Light</span></div>
        <div class="inv-item" onclick="quickAdd('Sound')"><span>🔊</span><span class="inv-label">Sound</span></div>
        <div class="sep"></div>
        <div id="inv-selected-info" style="font-size:11px;color:#6b7280;margin-left:auto;">Ничего не выбрано</div>
    </div>

    <div id="modal-overlay">
        <div id="modal-content" class="modal"></div>
    </div>
    <div id="notify"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/lua/lua.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>

    <script>
        // Three.js загрузка
        (function () {
            const scripts = [
                'three.min.js',
                'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'
            ];
            let loaded = false;
            function tryLoad(i) {
                if (i >= scripts.length) {
                    console.error('Three.js не загружен');
                    document.getElementById('fps-counter').textContent = '3D: ошибка';
                    return;
                }
                const s = document.createElement('script');
                s.src = scripts[i];
                s.onload = () => {
                    if (!loaded) {
                        loaded = true;
                        console.log('Three.js загружен из: ' + scripts[i]);
                        initThree();
                    }
                };
                s.onerror = () => {
                    console.warn('Не удалось загрузить: ' + scripts[i]);
                    tryLoad(i + 1);
                };
                document.head.appendChild(s);
            }
            tryLoad(0);
        })();
    </script>

    <script>
        // ============ CODEMIRROR ============
        let cmEditor = CodeMirror.fromTextArea(document.getElementById('script-editor'), {
            mode: 'lua',
            theme: 'monokai',
            lineNumbers: true,
            autoCloseBrackets: true,
            matchBrackets: true,
            indentUnit: 4,
            tabSize: 4,
            indentWithTabs: false,
            lineWrapping: false,
            viewportMargin: 50
        });

        function refreshCM() {
            setTimeout(() => {
                if (cmEditor) cmEditor.refresh();
            }, 10);
        }

        // ============ КАЧЕСТВО 3D ============
        const QUALITY_PRESETS = {
            low: {
                antialias: false,
                shadows: false,
                resolutionScale: 0.3,
                sphereSegments: 4,
                textures: false,
                helpers: false,
                ambientLight: 1.0,
                dirLight: 0.0,
                fog: true,
                skipSmallObjects: true,
                maxObjects: 1000,
                lodDistance: 50,
                viewportMultiplier: 1.5,
            },
            medium: {
                antialias: false,
                shadows: false,
                resolutionScale: 0.5,
                sphereSegments: 8,
                textures: false,
                helpers: false,
                ambientLight: 0.8,
                dirLight: 0.2,
                fog: true,
                skipSmallObjects: false,
                maxObjects: 3000,
                lodDistance: 100,
                viewportMultiplier: 1.5,
            },
            high: {
                antialias: true,
                shadows: false,
                resolutionScale: 0.75,
                sphereSegments: 16,
                textures: true,
                helpers: true,
                ambientLight: 0.5,
                dirLight: 0.6,
                fog: false,
                skipSmallObjects: false,
                maxObjects: 99999,
                lodDistance: 200,
                viewportMultiplier: 3.0,
            }
        };

        let currentQuality = 'low';
        let qualitySettings = QUALITY_PRESETS.low;

        function setQuality(level) {
            currentQuality = level;
            qualitySettings = QUALITY_PRESETS[level];
            document.querySelectorAll('#quality-selector button').forEach(b => b.classList.remove('active'));
            document.getElementById('q-' + level).classList.add('active');
            if (renderer) {
                renderer.shadowMap.enabled = qualitySettings.shadows;
                resize();
            }
            updateHelpers();
            reloadScene();
            notify('🎨 Качество: ' + level.toUpperCase());
        }

        // ============ РАЗДЕЛИТЕЛИ ПАНЕЛЕЙ ============
        function initResizers() {
            const resizers = document.querySelectorAll('.resizer');
            let currentResizer = null, startX = 0, startWidth = 0, startRightWidth = 0;

            resizers.forEach(resizer => {
                resizer.addEventListener('mousedown', (e) => {
                    currentResizer = resizer;
                    resizer.classList.add('active');
                    if (resizer.id === 'resizer-1') {
                        startWidth = document.getElementById('explorer').offsetWidth;
                        startX = e.clientX;
                    } else if (resizer.id === 'resizer-2') {
                        startRightWidth = document.getElementById('rightpanel').offsetWidth;
                        startX = e.clientX;
                    }
                    document.body.style.cursor = 'col-resize';
                    document.body.style.userSelect = 'none';
                });
            });

            document.addEventListener('mousemove', (e) => {
                if (!currentResizer) return;
                if (currentResizer.id === 'resizer-1') {
                    let w = Math.max(150, Math.min(400, startWidth + e.clientX - startX));
                    document.getElementById('explorer').style.width = w + 'px';
                } else if (currentResizer.id === 'resizer-2') {
                    let w = Math.max(200, Math.min(500, startRightWidth + startX - e.clientX));
                    document.getElementById('rightpanel').style.width = w + 'px';
                }
                refreshCM();
                resize();
            });

            document.addEventListener('mouseup', () => {
                if (currentResizer) {
                    currentResizer.classList.remove('active');
                    currentResizer = null;
                    document.body.style.cursor = '';
                    document.body.style.userSelect = '';
                    saveLayout();
                }
            });

            // Touch support
            resizers.forEach(resizer => {
                resizer.addEventListener('touchstart', (e) => {
                    currentResizer = resizer;
                    resizer.classList.add('active');
                    if (resizer.id === 'resizer-1') {
                        startWidth = document.getElementById('explorer').offsetWidth;
                        startX = e.touches[0].clientX;
                    } else if (resizer.id === 'resizer-2') {
                        startRightWidth = document.getElementById('rightpanel').offsetWidth;
                        startX = e.touches[0].clientX;
                    }
                    document.body.style.userSelect = 'none';
                });
            });

            document.addEventListener('touchmove', (e) => {
                if (!currentResizer) return;
                if (currentResizer.id === 'resizer-1') {
                    let w = Math.max(150, Math.min(400, startWidth + e.touches[0].clientX - startX));
                    document.getElementById('explorer').style.width = w + 'px';
                } else if (currentResizer.id === 'resizer-2') {
                    let w = Math.max(200, Math.min(500, startRightWidth + startX - e.touches[0].clientX));
                    document.getElementById('rightpanel').style.width = w + 'px';
                }
                refreshCM();
                resize();
            });

            document.addEventListener('touchend', () => {
                if (currentResizer) {
                    currentResizer.classList.remove('active');
                    currentResizer = null;
                    document.body.style.userSelect = '';
                    saveLayout();
                }
            });
        }

        function saveLayout() {
            const layout = {
                explorer: document.getElementById('explorer').style.width || '220px',
                rightpanel: document.getElementById('rightpanel').style.width || '260px'
            };
            localStorage.setItem('rbxstudio-layout', JSON.stringify(layout));
        }

        function loadLayout() {
            try {
                const saved = localStorage.getItem('rbxstudio-layout');
                if (saved) {
                    const layout = JSON.parse(saved);
                    document.getElementById('explorer').style.width = layout.explorer || '220px';
                    document.getElementById('rightpanel').style.width = layout.rightpanel || '260px';
                }
            } catch (e) { }
        }

        function resetLayout() {
            document.getElementById('explorer').style.width = '220px';
            document.getElementById('rightpanel').style.width = '260px';
            localStorage.removeItem('rbxstudio-layout');
            refreshCM();
            resize();
            notify('📐 Размеры панелей сброшены');
        }

        // ============ THREE.JS ПЕРЕМЕННЫЕ ============
        let selectedRef = null;
        let expanded = new Set();
        let treeData = [];
        let searchText = '';
        let sceneObjs = {};
        let camera;
        let renderer;
        let scene;
        let raycaster;
        let mouse;
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let spherical = { theta: Math.PI / 4, phi: Math.PI / 3, r: 30 };
        let target = { x: 0, y: 2, z: 0 };
        let keysPressed = {};
        let moveSpeed = 1.0;
        let fpsFrames = 0;
        let fpsTime = performance.now();
        let currentFPS = 0;
        let lastCameraUpdate = 0;
        const CAMERA_UPDATE_INTERVAL = 2000;

        // Кеш для raycasting
        let raycasterCache = {
            lastUpdate: 0,
            objects: [],
            updateInterval: 100
        };

        // ============ УВЕДОМЛЕНИЯ ============
        function notify(msg, type = 'ok') {
            const d = document.createElement('div');
            d.className = 'notif' + (type === 'err' ? ' err' : type === 'warn' ? ' warn' : '');
            d.textContent = msg;
            document.getElementById('notify').appendChild(d);
            setTimeout(() => d.remove(), 3000);
        }

        async function api(method, url, body) {
            const opts = {
                method: method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (body) {
                opts.body = JSON.stringify(body);
            }
            const r = await fetch(url, opts);
            return r.json();
        }

        // ============ THREE.JS INIT ============
        function initThree() {
            const vp = document.getElementById('viewport');

            renderer = new THREE.WebGLRenderer({
                antialias: qualitySettings.antialias,
                powerPreference: "low-power",
                precision: "mediump"
            });
            renderer.setPixelRatio(1);
            renderer.shadowMap.enabled = qualitySettings.shadows;
            vp.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);
            if (qualitySettings.fog) {
                scene.fog = new THREE.Fog(0x0f172a, 50, 400);
            }

            camera = new THREE.PerspectiveCamera(60, 1, 0.5, 500);

            // Инициализация raycaster с правильными настройками
            raycaster = new THREE.Raycaster();
            raycaster.params.Points.threshold = 0.1;
            raycaster.params.Line.threshold = 0.1;

            mouse = new THREE.Vector2();

            // Освещение
            scene.add(new THREE.AmbientLight(0xffffff, qualitySettings.ambientLight));
            if (qualitySettings.dirLight > 0) {
                const sun = new THREE.DirectionalLight(0xffffff, qualitySettings.dirLight);
                sun.position.set(20, 40, 20);
                scene.add(sun);
            }

            updateHelpers();
            window._selBox = null;
            resize();
            window.addEventListener('resize', resize);

            // Мышь
            renderer.domElement.addEventListener('mousedown', onMD);
            renderer.domElement.addEventListener('mousemove', onMM);
            renderer.domElement.addEventListener('mouseup', onMU);
            renderer.domElement.addEventListener('wheel', onWh, { passive: false });
            renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

            // Тач
            renderer.domElement.addEventListener('touchstart', onTS, { passive: false });
            renderer.domElement.addEventListener('touchmove', onTM, { passive: false });
            renderer.domElement.addEventListener('touchend', onTE);

            updateCamera();
            animate();
            loadTree();

            // Фокус viewport для WASD
            vp.addEventListener('click', () => vp.focus());
            vp.focus();

            // Мобильный геймпад
            document.querySelectorAll('.pad-btn').forEach(btn => {
                const key = btn.dataset.key;
                btn.addEventListener('touchstart', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    keysPressed[key] = true;
                    btn.classList.add('active');
                }, { passive: false });
                ['touchend', 'touchcancel'].forEach(ev =>
                    btn.addEventListener(ev, e => {
                        e.preventDefault();
                        keysPressed[key] = false;
                        btn.classList.remove('active');
                    }, { passive: false })
                );
            });
        }

        function updateHelpers() {
            if (window._gridHelper) {
                scene.remove(window._gridHelper);
                window._gridHelper = null;
            }
            if (window._axesHelper) {
                scene.remove(window._axesHelper);
                window._axesHelper = null;
            }
            if (qualitySettings.helpers) {
                window._gridHelper = new THREE.GridHelper(200, 40, 0x374151, 0x1f2937);
                window._axesHelper = new THREE.AxesHelper(5);
                scene.add(window._gridHelper);
                scene.add(window._axesHelper);
            }
        }

        function toggleHelpers() {
            qualitySettings.helpers = !qualitySettings.helpers;
            updateHelpers();
            notify(qualitySettings.helpers ? '📏 Сетка и оси: ВКЛ' : '📏 Сетка и оси: ВЫКЛ');
        }

        function resize() {
            const vp = document.getElementById('viewport');
            const scale = qualitySettings.resolutionScale;
            const w = Math.floor(vp.clientWidth * scale);
            const h = Math.floor(vp.clientHeight * scale);
            renderer.setSize(w, h, false);
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            if (camera) {
                camera.aspect = w / Math.max(h, 1);
                camera.updateProjectionMatrix();
            }
        }

        // ============ АНИМАЦИЯ ============
        function animate() {
            requestAnimationFrame(animate);

            fpsFrames++;
            const now = performance.now();
            if (now - fpsTime >= 1000) {
                currentFPS = Math.round(fpsFrames / ((now - fpsTime) / 1000));
                document.getElementById('fps-counter').textContent =
                    'FPS: ' + currentFPS + ' | ' + Object.keys(sceneObjs).length + ' obj';
                fpsFrames = 0;
                fpsTime = now;
            }

            // WASD движение
            const anyKeyPressed = keysPressed['w'] || keysPressed['s'] || keysPressed['a'] ||
                keysPressed['d'] || keysPressed['q'] || keysPressed['e'];

            if (anyKeyPressed) {
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                const right = new THREE.Vector3();
                right.crossVectors(direction, new THREE.Vector3(0, 1, 0)).normalize();
                const speed = moveSpeed * (spherical.r / 30) * 0.5;

                if (keysPressed['w']) {
                    target.x += direction.x * speed;
                    target.z += direction.z * speed;
                }
                if (keysPressed['s']) {
                    target.x -= direction.x * speed;
                    target.z -= direction.z * speed;
                }
                if (keysPressed['a']) {
                    target.x -= right.x * speed;
                    target.z -= right.z * speed;
                }
                if (keysPressed['d']) {
                    target.x += right.x * speed;
                    target.z += right.z * speed;
                }
                if (keysPressed['q']) target.y -= speed;
                if (keysPressed['e']) target.y += speed;

                updateCamera();

                // Обновляем сцену при движении (не чаще раза в 2 сек)
                if (now - lastCameraUpdate > CAMERA_UPDATE_INTERVAL &&
                    Object.keys(sceneObjs).length > 500) {
                    lastCameraUpdate = now;
                    reloadScene();
                }
            }

            renderer.render(scene, camera);
        }

        function updateCamera() {
            const { theta, phi, r } = spherical;
            camera.position.set(
                target.x + r * Math.sin(phi) * Math.sin(theta),
                target.y + r * Math.cos(phi),
                target.z + r * Math.sin(phi) * Math.cos(theta)
            );
            camera.lookAt(target.x, target.y, target.z);
        }

        // ============ ПРЕСЕТЫ КАМЕРЫ ============
        function resetCamera() {
            spherical = { theta: Math.PI / 4, phi: Math.PI / 3, r: 30 };
            target = { x: 0, y: 2, z: 0 };
            updateCamera();
            notify('🏠 Камера сброшена');
        }

        function topView() {
            spherical = { theta: 0, phi: 0.01, r: spherical.r };
            updateCamera();
            notify('⬆ Вид сверху');
        }

        function frontView() {
            spherical = { theta: 0, phi: Math.PI / 2, r: spherical.r };
            updateCamera();
            notify('📷 Вид спереди');
        }

        function rightView() {
            spherical = { theta: Math.PI / 2, phi: Math.PI / 2, r: spherical.r };
            updateCamera();
            notify('➡ Вид справа');
        }

        // ============ МЫШЬ ============
        function onMD(e) {
            isDragging = false;
            prevMouse = { x: e.clientX, y: e.clientY };
        }

        function onMM(e) {
            if (!e.buttons) return;

            const dx = e.clientX - prevMouse.x;
            const dy = e.clientY - prevMouse.y;
            prevMouse = { x: e.clientX, y: e.clientY };

            if (Math.abs(dx) + Math.abs(dy) > 3) {
                isDragging = true;
            }

            if (e.buttons === 1) {
                spherical.theta -= dx * .005;
                spherical.phi = Math.max(.05, Math.min(Math.PI - .05, spherical.phi - dy * .005));
            } else if (e.buttons === 2 || e.buttons === 4) {
                const direction = new THREE.Vector3();
                camera.getWorldDirection(direction);
                const right = new THREE.Vector3();
                right.crossVectors(direction, new THREE.Vector3(0, 1, 0)).normalize();
                const up = new THREE.Vector3();
                up.crossVectors(right, direction).normalize();

                const panSpeed = spherical.r * 0.002;
                target.x -= right.x * dx * panSpeed + up.x * dy * panSpeed;
                target.y -= up.y * dy * panSpeed;
                target.z -= right.z * dx * panSpeed + up.z * dy * panSpeed;
            }

            updateCamera();
        }

        function onMU(e) {
            if (!isDragging && e.button === 0) {
                pick(e.clientX, e.clientY);
            }
        }

        function onWh(e) {
            e.preventDefault();

            if (e.shiftKey) {
                moveSpeed = Math.max(0.1, Math.min(10, moveSpeed - e.deltaY * 0.01));
                const indicator = document.getElementById('speed-indicator');
                indicator.textContent = '🚀 x' + moveSpeed.toFixed(1);
                indicator.style.display = 'block';
                clearTimeout(window._speedTimeout);
                window._speedTimeout = setTimeout(() => {
                    indicator.style.display = 'none';
                }, 1500);
                return;
            }

            spherical.r = Math.max(1, Math.min(500, spherical.r + e.deltaY * .05));
            updateCamera();
        }

        // ============ ТАЧ ============
        let _tch = [];
        let _td = 0;
        let _ts = null;

        function onTS(e) {
            e.preventDefault();
            _tch = Array.from(e.touches);
            _ts = _tch[0] ? { x: _tch[0].clientX, y: _tch[0].clientY } : null;
            if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                _td = Math.sqrt(dx * dx + dy * dy);
            }
        }

        function onTM(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                const t = e.touches[0];
                const dx = t.clientX - _tch[0].clientX;
                const dy = t.clientY - _tch[0].clientY;
                _tch = Array.from(e.touches);
                spherical.theta -= dx * .005;
                spherical.phi = Math.max(.05, Math.min(Math.PI - .05, spherical.phi - dy * .005));
                updateCamera();
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                spherical.r = Math.max(1, Math.min(500, spherical.r + (dist - _td) * .05));
                _td = dist;
                _tch = Array.from(e.touches);
                updateCamera();
            }
        }

        function onTE(e) {
            if (e.changedTouches.length === 1 && _ts) {
                const t = e.changedTouches[0];
                if (Math.abs(t.clientX - _ts.x) < 8 && Math.abs(t.clientY - _ts.y) < 8) {
                    pick(t.clientX, t.clientY);
                }
            }
        }

        // ============ ИСПРАВЛЕННЫЙ PICK ============
        function pick(cx, cy) {
            const vp = document.getElementById('viewport');
            const rect = vp.getBoundingClientRect();
            mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;

            // Пересоздаем raycaster если нужно
            if (!raycaster) {
                raycaster = new THREE.Raycaster();
                raycaster.params.Points.threshold = 0.1;
                raycaster.params.Line.threshold = 0.1;
            }

            raycaster.setFromCamera(mouse, camera);

            // Обновляем кеш объектов для raycasting
            const now = performance.now();
            let objectsToCheck;

            if (now - raycasterCache.lastUpdate > raycasterCache.updateInterval) {
                raycasterCache.objects = Object.values(sceneObjs);
                raycasterCache.lastUpdate = now;
            }
            objectsToCheck = raycasterCache.objects;

            // Для low/medium с большим количеством объектов - оптимизация
            if (currentQuality !== 'high' && objectsToCheck.length > 2000) {
                objectsToCheck = objectsToCheck
                    .map(obj => ({
                        obj: obj,
                        dist: obj.position.distanceToSquared(camera.position)
                    }))
                    .sort((a, b) => a.dist - b.dist)
                    .slice(0, 2000)
                    .map(item => item.obj);
            }

            const hits = raycaster.intersectObjects(objectsToCheck, false);

            if (hits.length) {
                const hit = hits[0];
                if (hit.object && hit.object.userData && hit.object.userData.ref) {
                    selectRef(parseInt(hit.object.userData.ref));
                    return;
                }
            }

            deselect();
        }

        // ============ ИСПРАВЛЕННАЯ СЦЕНА ============
        async function reloadScene() {
            const params = new URLSearchParams({
                cx: Math.round(target.x),
                cy: Math.round(target.y),
                cz: Math.round(target.z),
                r: Math.round(spherical.r * qualitySettings.viewportMultiplier),
                quality: currentQuality
            });

            const r = await api('GET', '/api/scene?' + params.toString());
            if (!r.ok) return;

            // Очистка старых объектов
            for (const mesh of Object.values(sceneObjs)) {
                scene.remove(mesh);
                if (mesh.geometry) mesh.geometry.dispose();
                if (mesh.material) {
                    if (Array.isArray(mesh.material)) {
                        mesh.material.forEach(m => {
                            if (m.map) m.map.dispose();
                            m.dispose();
                        });
                    } else {
                        if (mesh.material.map) mesh.material.map.dispose();
                        mesh.material.dispose();
                    }
                }
            }
            sceneObjs = {};

            // Сбрасываем кеш raycasting
            raycasterCache.objects = [];
            raycasterCache.lastUpdate = 0;

            if (window._selBox) {
                scene.remove(window._selBox);
                window._selBox = null;
            }

            // Кеши геометрий и материалов
            const geoCache = {};
            const matCache = {};

            let objects = r.objects;
            let totalAvailable = r.total || objects.length;

            // Применяем лимиты качества
            if (qualitySettings.maxObjects && objects.length > qualitySettings.maxObjects) {
                if (currentQuality === 'high') {
                    const maxHighObjects = Math.min(objects.length, 10000);
                    objects = objects.slice(0, maxHighObjects);
                } else {
                    objects = objects.slice(0, qualitySettings.maxObjects);
                }
            }

            for (const o of objects) {
                // Кеш геометрий
                const geoKey = o.shape + '_' + (o.sx || 1).toFixed(2) + '_' + (o.sy || 1).toFixed(2) + '_' + (o.sz || 1).toFixed(2);
                if (!geoCache[geoKey]) {
                    if (o.shape === 'sphere') {
                        const seg = Math.max(4, qualitySettings.sphereSegments);
                        const radius = Math.max(o.sx || 1, o.sy || 1, o.sz || 1) * 0.5;
                        geoCache[geoKey] = new THREE.SphereGeometry(radius, seg, Math.round(seg * 0.75));
                    } else if (o.shape === 'cylinder') {
                        const seg = Math.max(6, qualitySettings.sphereSegments);
                        geoCache[geoKey] = new THREE.CylinderGeometry((o.sx || 1) * 0.5, (o.sz || 1) * 0.5, o.sy || 1, seg);
                    } else {
                        geoCache[geoKey] = new THREE.BoxGeometry(o.sx || 1, o.sy || 1, o.sz || 1, 1, 1, 1);
                    }
                }
                const geo = geoCache[geoKey];

                // Кеш материалов
                const matKey = (o.color || '#a0a0a0') + '_' + (o.opacity || 1).toFixed(1);
                if (!matCache[matKey]) {
                    matCache[matKey] = new THREE.MeshLambertMaterial({
                        color: o.color || '#a0a0a0',
                        transparent: (o.opacity || 1) < 1.0,
                        opacity: o.opacity || 1.0,
                        flatShading: currentQuality === 'low',
                    });
                }
                const mat = matCache[matKey];

                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(o.px || 0, o.py || 0, o.pz || 0);

                // Поворот
                if (o.rot && o.rot.length >= 9) {
                    const rm = new THREE.Matrix4();
                    rm.set(
                        o.rot[0], o.rot[3], o.rot[6], o.px || 0,
                        o.rot[1], o.rot[4], o.rot[7], o.py || 0,
                        o.rot[2], o.rot[5], o.rot[8], o.pz || 0,
                        0, 0, 0, 1
                    );
                    mesh.matrix.copy(rm);
                    mesh.matrixAutoUpdate = false;
                } else {
                    mesh.matrixAutoUpdate = false;
                    mesh.updateMatrix();
                }

                mesh.castShadow = qualitySettings.shadows;
                mesh.receiveShadow = qualitySettings.shadows;
                mesh.userData.ref = o.ref;
                mesh.frustumCulled = true;

                if ((o.opacity || 1) < 1.0) {
                    mesh.material.depthWrite = (o.opacity || 1) > 0.7;
                }

                scene.add(mesh);
                sceneObjs[o.ref] = mesh;
            }

            const shown = Object.keys(sceneObjs).length;
            notify('🔄 Сцена: ' + shown + ' объектов' + (totalAvailable > shown ? ' (из ' + totalAvailable + ')' : ''));
            updateInventoryCount();

            // Обновляем выделение если было
            if (selectedRef && sceneObjs[selectedRef]) {
                highlightSelected(selectedRef);
            }
        }

        function highlightSelected(ref) {
            for (const [r, mesh] of Object.entries(sceneObjs)) {
                mesh.material.emissive = new THREE.Color(parseInt(r) === ref ? 0xff6600 : 0);
                mesh.material.emissiveIntensity = parseInt(r) === ref ? 0.4 : 0;
            }
            if (window._selBox) {
                scene.remove(window._selBox);
                window._selBox = null;
            }
            if (ref && sceneObjs[ref]) {
                const box = new THREE.BoxHelper(sceneObjs[ref], 0xff6600);
                scene.add(box);
                window._selBox = box;
            }
        }

        // ============ ДЕРЕВО ============
        async function loadTree() {
            const r = await api('GET', '/api/tree');
            if (!r.ok) return;
            treeData = r.tree;
            for (const n of treeData) {
                expanded.add(n.ref);
            }
            renderTree();
            reloadScene();
        }

        function updateInventoryCount() {
            const info = document.getElementById('inv-selected-info');
            if (selectedRef) {
                const node = findNodeByRef(treeData, selectedRef);
                if (node) {
                    info.textContent = 'Выбрано: ' + node.name + ' (' + node.cls + ')';
                }
            } else {
                info.textContent = 'Объектов: ' + Object.keys(sceneObjs).length;
            }
        }

        function findNodeByRef(nodes, ref) {
            for (const n of nodes) {
                if (n.ref === ref) return n;
                if (n.children) {
                    const found = findNodeByRef(n.children, ref);
                    if (found) return found;
                }
            }
            return null;
        }

        function onSearch(v) {
            searchText = v.trim().toLowerCase();
            if (searchText) {
                for (const n of treeData) {
                    expandAll(n);
                }
            }
            renderTree();
        }

        function expandAll(n) {
            expanded.add(n.ref);
            for (const c of n.children) {
                expandAll(c);
            }
        }

        function collapseAll() {
            expanded.clear();
            renderTree();
        }

        function expandAllVisible() {
            for (const n of treeData) {
                expandAll(n);
            }
            renderTree();
        }

        function renderTree() {
            const c = document.getElementById('tree');
            c.innerHTML = '';
            for (const n of treeData) {
                renderNode(c, n, 0);
            }
        }

        function renderNode(parentEl, node, depth) {
            const matchesSearch = !searchText ||
                node.name.toLowerCase().includes(searchText) ||
                node.cls.toLowerCase().includes(searchText);
            const hasMatchingChildren = searchText ? node.children.some(child => anyMatch(child)) : false;
            const isVisible = matchesSearch || hasMatchingChildren;

            if (!isVisible) return;

            const row = document.createElement('div');
            row.className = 'tree-node' + (node.ref === selectedRef ? ' selected' : '');
            row.style.paddingLeft = (depth * 14 + 2) + 'px';

            const arrow = document.createElement('span');
            arrow.className = 'tree-arrow';
            if (node.children.length) {
                arrow.textContent = expanded.has(node.ref) ? '▼' : '▶';
                arrow.onclick = (e) => {
                    e.stopPropagation();
                    toggleExpand(node.ref);
                };
            }
            row.appendChild(arrow);

            if (node.icon) {
                const img = document.createElement('img');
                img.className = 'tree-icon';
                img.src = node.icon;
                img.onerror = () => { img.style.display = 'none'; };
                row.appendChild(img);
            }

            const label = document.createElement('span');
            label.className = 'tree-label';
            if (searchText && node.name.toLowerCase().includes(searchText)) {
                const idx = node.name.toLowerCase().indexOf(searchText);
                label.innerHTML = esc(node.name.slice(0, idx)) +
                    '<mark>' + esc(node.name.slice(idx, idx + searchText.length)) + '</mark>' +
                    esc(node.name.slice(idx + searchText.length));
            } else {
                label.textContent = node.name;
            }
            label.title = node.cls;

            row.onclick = () => selectRef(node.ref);
            row.appendChild(label);

            parentEl.appendChild(row);

            if (expanded.has(node.ref)) {
                for (const child of node.children) {
                    renderNode(parentEl, child, depth + 1);
                }
            }
        }

        function anyMatch(n) {
            if (!searchText) return true;
            if (n.name.toLowerCase().includes(searchText)) return true;
            return n.children.some(child => anyMatch(child));
        }

        function toggleExpand(ref) {
            if (expanded.has(ref)) {
                expanded.delete(ref);
            } else {
                expanded.add(ref);
            }
            renderTree();
        }

        function esc(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ============ ВЫБОР ОБЪЕКТА ============
        async function selectRef(ref) {
            selectedRef = ref;
            highlightSelected(ref);
            renderTree();
            updateInventoryCount();
            const r = await api('GET', '/api/instance/' + ref);
            if (!r.ok) return;
            renderProps(r);
        }

        function deselect() {
            selectedRef = null;
            highlightSelected(null);
            renderTree();
            updateInventoryCount();
            document.getElementById('tab-props').innerHTML = '<p style="color:#6b7280;font-size:12px;padding:8px">← Выбери объект</p>';
        }

        // ============ СВОЙСТВА ============
        function renderProps(r) {
            const SCLS = ['Script', 'LocalScript', 'ModuleScript'];
            const panel = document.getElementById('tab-props');
            panel.innerHTML = '';

            const hdr = document.createElement('div');
            hdr.className = 'prop-header';
            if (r.icon) {
                const img = document.createElement('img');
                img.style.cssText = 'width:32px;height:32px;object-fit:contain;background:white;border-radius:4px;margin-bottom:4px;display:block';
                img.src = r.icon;
                hdr.appendChild(img);
            }
            const cls = document.createElement('div');
            cls.className = 'prop-cls';
            cls.textContent = r.cls;
            const ref = document.createElement('div');
            ref.className = 'prop-ref';
            ref.textContent = 'ref ' + r.ref;
            hdr.appendChild(cls);
            hdr.appendChild(ref);
            panel.appendChild(hdr);

            // Position, Rotation, Size
            const specialProps = ['Position', 'Rotation', 'Size'];
            for (const propName of specialProps) {
                if (r.props[propName]) {
                    addVector3Prop(panel, r.ref, propName, r.props[propName]);
                }
            }

            // Остальные свойства
            for (const [k, v] of Object.entries(r.props).sort()) {
                if (k === 'Source' || k === 'CFrame' || specialProps.includes(k) || k === '_assets') {
                    continue;
                }
                addPropRow(panel, r.ref, k, v);
            }

            if (SCLS.includes(r.cls)) {
                document.getElementById('script-name').textContent = r.cls + ': ' + (r.props.Name || '?');
                cmEditor.setValue(r.props.Source || '');
                switchTab('script');
                refreshCM();
            } else {
                switchTab('props');
            }
        }

        function addVector3Prop(panel, ref, propName, value) {
            const container = document.createElement('div');
            container.style.cssText = 'margin-bottom:4px;padding:4px;background:#111827;border-radius:4px';

            const label = document.createElement('div');
            label.style.cssText = 'font-size:11px;color:#9ca3af;margin-bottom:4px;font-weight:bold';
            label.textContent = propName;
            container.appendChild(label);

            const coords = ['x', 'y', 'z'];
            const colors = ['#ef4444', '#22c55e', '#3b82f6'];

            const row = document.createElement('div');
            row.style.cssText = 'display:flex;gap:4px';

            coords.forEach((coord, i) => {
                const inputGroup = document.createElement('div');
                inputGroup.style.cssText = 'flex:1;display:flex;align-items:center;gap:2px';

                const coordLabel = document.createElement('span');
                coordLabel.style.cssText = 'font-size:10px;color:' + colors[i] + ';font-weight:bold;min-width:12px';
                coordLabel.textContent = coord.toUpperCase();

                const input = document.createElement('input');
                input.className = 'prop-val';
                input.type = 'number';
                input.step = propName === 'Rotation' ? '1' : '0.1';
                input.value = typeof value === 'object' ? (value[coord] || 0) : 0;
                input.style.cssText = 'font-size:11px;padding:2px 4px';

                input.onchange = async () => {
                    const newValue = { ...value };
                    newValue[coord] = parseFloat(input.value) || 0;
                    await api('POST', '/api/instance/' + ref, {
                        prop: propName,
                        value: newValue
                    });
                    reloadScene();
                };

                inputGroup.appendChild(coordLabel);
                inputGroup.appendChild(input);
                row.appendChild(inputGroup);
            });

            container.appendChild(row);
            panel.appendChild(container);
        }

        function addPropRow(panel, ref, k, v) {
            const row = document.createElement('div');
            row.className = 'prop-row';

            const nm = document.createElement('span');
            nm.className = 'prop-name';
            nm.textContent = k;
            nm.title = k;
            row.appendChild(nm);

            if (typeof v === 'boolean') {
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.className = 'prop-bool';
                cb.checked = v;
                cb.onchange = () => setProp(ref, k, cb.checked);
                row.appendChild(cb);
            } else if (v && typeof v === 'object' && 'r' in v && 'g' in v && 'b' in v) {
                const pr = document.createElement('div');
                pr.className = 'prop-color-preview';
                const hex = '#' + [v.r, v.g, v.b].map(x =>
                    Math.min(255, Math.max(0, Math.round(x * 255))).toString(16).padStart(2, '0')
                ).join('');
                pr.style.background = hex;
                pr.onclick = () => {
                    const inp = document.createElement('input');
                    inp.type = 'color';
                    inp.value = hex;
                    inp.onchange = () => {
                        const color = {
                            r: parseInt(inp.value.slice(1, 3), 16) / 255,
                            g: parseInt(inp.value.slice(3, 5), 16) / 255,
                            b: parseInt(inp.value.slice(5, 7), 16) / 255
                        };
                        setProp(ref, k, color);
                        pr.style.background = inp.value;
                        reloadScene();
                    };
                    inp.click();
                };
                row.appendChild(pr);
            } else {
                const inp = document.createElement('input');
                inp.className = 'prop-val';
                inp.value = typeof v === 'object' ? JSON.stringify(v).slice(0, 80) : String(v ?? '');
                inp.onchange = () => {
                    let val = inp.value;
                    try { val = JSON.parse(val); } catch (e) { }
                    setProp(ref, k, val);
                };
                row.appendChild(inp);
            }
            panel.appendChild(row);
        }

        async function setProp(ref, prop, val) {
            await api('POST', '/api/instance/' + ref, {
                prop: prop,
                value: val
            });
        }

        async function saveScript() {
            if (selectedRef === null) {
                notify('Скрипт не выбран', 'warn');
                return;
            }
            const src = cmEditor.getValue();
            await api('POST', '/api/instance/' + selectedRef, {
                prop: 'Source',
                value: src
            });
            notify('✅ Скрипт сохранён');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab').forEach((el, i) => {
                el.classList.toggle('active', (i === 0 && t === 'props') || (i === 1 && t === 'script'));
            });
            document.getElementById('tab-props').style.display = t === 'props' ? '' : 'none';
            document.getElementById('tab-script').style.display = t === 'script' ? 'flex' : 'none';
            if (t === 'script') refreshCM();
        }

        // ============ БЫСТРОЕ ДОБАВЛЕНИЕ ============
        async function quickAdd(cls) {
            const name = 'New' + cls;
            let parent = selectedRef;
            if (parent === null) {
                const findWs = ns => {
                    for (const n of ns) {
                        if (n.cls === 'Workspace') return n.ref;
                        const c = findWs(n.children);
                        if (c !== null) return c;
                    }
                    return null;
                };
                parent = findWs(treeData) ?? -1;
            }
            const r = await api('PUT', '/api/instance', {
                class: cls,
                name: name,
                parent: parent
            });
            if (r.ok) {
                notify('✅ ' + cls + ' добавлен');
                loadTree();
            } else {
                notify(r.error || 'Ошибка', 'err');
            }
        }

        // ============ ФАЙЛОВЫЙ БРАУЗЕР ============
        let _fbMode = 'open';
        let _fbPath = '';

        async function openFileBrowser(mode) {
            _fbMode = mode;
            const r = await api('GET', '/api/status');
            _fbPath = r.file ? r.file.replace(/[/\\][^/\\]+$/, '') : '.';
            showModal(fbModal());
            browseTo(_fbPath);
        }

        function fbModal() {
            return '<h3>' + (_fbMode === 'open' ? '📂 Открыть' : '💾 Сохранить как') + '</h3>' +
                '<div id="fb-path"></div>' +
                '<div id="fb-list"></div>' +
                (_fbMode === 'save' ? '<input id="fb-name" placeholder="файл.rbxl">' : '') +
                '<div class="modal-row">' +
                (_fbMode === 'save' ? '<button onclick="fbSave()" style="background:#065f46">Сохранить</button>' : '') +
                '<button onclick="closeModal()">Отмена</button>' +
                '</div>';
        }

        async function browseTo(path) {
            _fbPath = path;
            const r = await api('GET', '/api/browse?path=' + encodeURIComponent(path));
            if (!r.ok) {
                notify(r.error, 'err');
                return;
            }
            document.getElementById('fb-path').textContent = r.path;
            const list = document.getElementById('fb-list');
            list.innerHTML = '';
            for (const e of r.entries) {
                const row = document.createElement('div');
                let cls = 'fb-entry';
                if (e.type === 'dir') cls += ' dir';
                else if (e.type === 'rbxl' || e.type === 'rbxlx') cls += ' file-rbxl';
                else if (e.type === 'json') cls += ' file-json';
                row.className = cls;
                const icon = e.type === 'dir' ? '📁' :
                    e.type === 'rbxl' || e.type === 'rbxlx' ? '🎮' :
                        e.type === 'json' ? '📋' : '📄';
                row.innerHTML = '<span>' + icon + '</span><span>' + esc(e.name) + '</span>';
                if (e.size) {
                    const sz = document.createElement('span');
                    sz.className = 'fb-size';
                    sz.textContent = e.size > 1048576 ? (e.size / 1048576).toFixed(1) + 'MB' :
                        e.size > 1024 ? (e.size / 1024).toFixed(0) + 'KB' : e.size + 'B';
                    row.appendChild(sz);
                }
                row.onclick = () => {
                    if (e.type === 'dir') browseTo(e.path);
                    else if (_fbMode === 'open') fbOpen(e.path);
                };
                list.appendChild(row);
            }
        }

        async function fbOpen(path) {
            closeModal();
            const r = await api('POST', '/api/open', { path: path });
            if (r.ok) {
                notify('✅ ' + r.count + ' объектов');
                loadTree();
            } else {
                notify(r.error, 'err');
            }
        }

        function fbSave() {
            const nm = document.getElementById('fb-name');
            if (!nm || !nm.value.trim()) {
                notify('Введи имя', 'warn');
                return;
            }
            const path = _fbPath.replace(/\/$/, '') + '/' + nm.value.trim();
            closeModal();
            doSave(path);
        }

        async function doSave(path) {
            const r = await api('POST', '/api/save', { path: path });
            if (r.ok) notify('💾 ' + r.path);
            else notify(r.error || 'Ошибка', 'err');
        }

        async function saveFile() {
            const r = await api('GET', '/api/status');
            if (!r.file) {
                openFileBrowser('save');
                return;
            }
            doSave(r.file);
        }

        // ============ ДИАЛОГИ ============
        function showAddDialog() {
            const ALL_CLS = [
                'Part', 'WedgePart', 'SpherePart', 'MeshPart', 'Model', 'Folder',
                'Script', 'LocalScript', 'ModuleScript', 'RemoteEvent', 'RemoteFunction',
                'BindableEvent', 'BindableFunction', 'ScreenGui', 'Frame', 'TextLabel',
                'TextButton', 'TextBox', 'ImageLabel', 'ImageButton', 'Sound',
                'ParticleEmitter', 'Fire', 'Smoke', 'PointLight', 'SpotLight',
                'SurfaceLight', 'NumberValue', 'StringValue', 'BoolValue', 'IntValue',
                'Animation', 'Tool', 'Camera'
            ].sort();
            showModal(
                '<h3>➕ Добавить</h3>' +
                '<select id="add-cls">' + ALL_CLS.map(c => '<option>' + c + '</option>').join('') + '</select>' +
                '<input id="add-name" placeholder="Имя" value="NewPart">' +
                '<p style="font-size:11px;color:#9ca3af;margin-top:4px">Родитель: ' +
                (selectedRef !== null ? 'ref ' + selectedRef : 'Workspace') + '</p>' +
                '<div class="modal-row">' +
                '<button onclick="doAdd()" style="background:#065f46">Добавить</button>' +
                '<button onclick="closeModal()">Отмена</button>' +
                '</div>'
            );
        }

        async function doAdd() {
            const cls = document.getElementById('add-cls').value;
            const name = document.getElementById('add-name').value || 'New' + cls;
            closeModal();
            let parent = selectedRef;
            if (parent === null) {
                const findWs = ns => {
                    for (const n of ns) {
                        if (n.cls === 'Workspace') return n.ref;
                        const c = findWs(n.children);
                        if (c !== null) return c;
                    }
                    return null;
                };
                parent = findWs(treeData) ?? -1;
            }
            const r = await api('PUT', '/api/instance', {
                class: cls,
                name: name,
                parent: parent
            });
            if (r.ok) {
                notify('✅ ' + cls);
                loadTree();
            } else {
                notify(r.error || 'Ошибка', 'err');
            }
        }

        async function deleteSelected() {
            if (selectedRef === null) {
                notify('Не выбран', 'warn');
                return;
            }
            const r = await api('DELETE', '/api/instance/' + selectedRef);
            if (r.ok) {
                notify('🗑 Удалён');
                selectedRef = null;
                loadTree();
            }
        }

        function showPublishDialog() {
            showModal(
                '<h3>☁ Open Cloud</h3>' +
                '<input id="pu" placeholder="Universe ID">' +
                '<input id="pp" placeholder="Place ID">' +
                '<input id="pk" placeholder="API Key" type="password">' +
                '<select id="pv">' +
                '<option>Published</option>' +
                '<option>Saved</option>' +
                '</select>' +
                '<div class="modal-row">' +
                '<button onclick="doPub()" style="background:#7c3aed">☁ Опубликовать</button>' +
                '<button onclick="closeModal()">Отмена</button>' +
                '</div>'
            );
        }

        async function doPub() {
            const b = {
                universe_id: document.getElementById('pu').value,
                place_id: document.getElementById('pp').value,
                api_key: document.getElementById('pk').value,
                version_type: document.getElementById('pv').value
            };
            closeModal();
            const r = await api('POST', '/api/publish', b);
            if (r.ok) notify('✅ Опубликовано!');
            else notify('HTTP ' + r.status + ': ' + (r.text || r.error), 'err');
        }

        function showModal(html) {
            document.getElementById('modal-content').innerHTML = html;
            document.getElementById('modal-overlay').classList.add('show');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('show');
        }

        // ============ КЛАВИШИ ============
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' ||
                e.target.classList.contains('CodeMirror') || e.target.closest('.CodeMirror')) {
                return;
            }

            keysPressed[e.key.toLowerCase()] = true;

            if (e.ctrlKey && e.key === 'o') {
                e.preventDefault();
                openFileBrowser('open');
            } else if (e.ctrlKey && e.shiftKey && e.key === 'S') {
                e.preventDefault();
                openFileBrowser('save');
            } else if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveFile();
            } else if (e.key === 'Delete') {
                deleteSelected();
            } else if (e.key === 'Escape') {
                closeModal();
                deselect();
            } else if (e.key === 'F5') {
                e.preventDefault();
                reloadScene();
            } else if (e.key === 'f' && !e.ctrlKey) {
                if (selectedRef && sceneObjs[selectedRef]) {
                    const p = sceneObjs[selectedRef].position;
                    target = { x: p.x, y: p.y, z: p.z };
                    updateCamera();
                    notify('🎯 Фокус на объекте');
                }
            }
        });

        document.addEventListener('keyup', (e) => {
            keysPressed[e.key.toLowerCase()] = false;
        });

        document.getElementById('modal-overlay').onclick = e => {
            if (e.target.id === 'modal-overlay') closeModal();
        };

        // ============ ИНИЦИАЛИЗАЦИЯ ============
        window.addEventListener('DOMContentLoaded', () => {
            loadLayout();
            initResizers();
        });
    </script>
</body>
